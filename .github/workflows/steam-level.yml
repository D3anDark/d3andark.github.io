name: Update Steam level

# Keeps src/data/steam.json in sync with the current Steam level so the
# site never needs a manual edit. Scrapes the public profile page (no API
# key required) and commits only when the level actually changed.

on:
  schedule:
    - cron: "17 5 * * *"   # daily, 05:17 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: steam-level
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Steam level
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Firefox/126.0"
          level=""
          for url in \
            "https://steamcommunity.com/id/DeanDark/" \
            "https://steamcommunity.com/id/DeanDark/badges/"; do
            html="$(curl -sL --max-time 25 -A "$UA" "$url" || true)"
            # The profile owner's level is the FIRST friendPlayerLevelNum on the page.
            level="$(printf '%s' "$html" | grep -oiE 'friendPlayerLevelNum">[0-9]+' | head -1 | grep -oE '[0-9]+' || true)"
            [ -n "$level" ] && break
          done

          if ! printf '%s' "$level" | grep -qE '^[0-9]+$'; then
            echo "Could not parse a numeric level; leaving steam.json untouched."
            exit 0
          fi

          mkdir -p src/data
          printf '{\n  "level": %s,\n  "updated": "%s"\n}\n' \
            "$level" "$(date -u +%Y-%m-%d)" > src/data/steam.json
          echo "Parsed Steam level: $level"

      - name: Commit if changed
        run: |
          set -euo pipefail
          # Ignore the "updated" date churn: only commit when the level line differs.
          if git diff -- src/data/steam.json | grep -qE '^[+-] *"level"'; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/steam.json
            git commit -m "chore: update Steam level"
            git push
          else
            git checkout -- src/data/steam.json
            echo "Level unchanged; nothing to commit."
          fi
